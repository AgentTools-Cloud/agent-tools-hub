# agent-tools-hub nginx vhost. Mirrors the facilitator/mcpserver pattern:
# uvicorn listens on 127.0.0.1:9300, nginx terminates TLS and reverse-proxies.
#
#   cp nginx/hub.agent-tools.cloud.conf /etc/nginx/sites-available/
#   ln -s /etc/nginx/sites-available/hub.agent-tools.cloud.conf /etc/nginx/sites-enabled/
#   certbot --nginx -d hub.agent-tools.cloud
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name hub.agent-tools.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hub.agent-tools.cloud;

    ssl_certificate     /etc/letsencrypt/live/hub.agent-tools.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub.agent-tools.cloud/privkey.pem;

    # x402 payment headers must reach browser/fetch clients (the $0 post-mortem fix).
    add_header Access-Control-Expose-Headers "PAYMENT-REQUIRED, PAYMENT-RESPONSE, X-PAYMENT, X-Payment-Tx" always;
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-PAYMENT, x-payment" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:9300;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
